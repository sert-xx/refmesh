<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>refmesh console</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <header class="topbar">
      <div class="brand">
        <span class="brand-mark">●</span>
        <span class="brand-name">refmesh console</span>
      </div>
      <nav class="tabs">
        <button class="tab" data-tab="overview" type="button">Overview</button>
        <button class="tab" data-tab="concepts" type="button">Concepts</button>
        <button class="tab" data-tab="search" type="button">Search</button>
        <button class="tab" data-tab="graph" type="button">Graph</button>
      </nav>
      <div class="topbar-spacer"></div>
      <button id="refresh" class="ghost-btn" type="button">Refresh</button>
    </header>

    <main>
      <section class="view" data-view="overview">
        <h2>Overview</h2>
        <div id="stats-cards" class="cards"></div>
        <h3>Edge type distribution</h3>
        <div id="edge-bars" class="edge-bars"></div>
        <h3>Storage</h3>
        <div id="storage-info" class="storage"></div>
      </section>

      <section class="view" data-view="concepts" hidden>
        <h2>Concepts</h2>
        <div class="row-controls">
          <label>
            Sort:
            <select id="concepts-sort">
              <option value="lastSeenAt">最終更新</option>
              <option value="touchCount">touchCount</option>
              <option value="id">id</option>
            </select>
          </label>
          <label class="inline-checkbox">
            <input type="checkbox" id="concepts-archived" /> archived も含める
          </label>
          <input id="concepts-filter" type="search" placeholder="id / description で絞り込み" />
        </div>
        <div id="concepts-table" class="table-wrap"></div>
        <div class="pager">
          <button id="concepts-prev" class="ghost-btn" type="button">← prev</button>
          <span id="concepts-pageinfo"></span>
          <button id="concepts-next" class="ghost-btn" type="button">next →</button>
        </div>
      </section>

      <section class="view" data-view="search" hidden>
        <h2>Search</h2>
        <form id="search-form" class="row-controls">
          <input id="search-query" type="search" placeholder="自然言語クエリ" autocomplete="off" />
          <label>
            limit
            <input id="search-limit" type="number" min="1" max="100" value="10" />
          </label>
          <label>
            depth
            <input id="search-depth" type="number" min="0" max="4" value="1" />
          </label>
          <label>
            threshold
            <input id="search-threshold" type="number" min="0" max="1" step="0.05" value="0.3" />
          </label>
          <label class="inline-checkbox">
            <input type="checkbox" id="search-archived" /> archived
          </label>
          <button type="submit" class="primary-btn">Search</button>
          <button id="search-graph-btn" type="button" class="ghost-btn" disabled>
            グラフで開く
          </button>
        </form>
        <div id="search-result"></div>
      </section>

      <section class="view" data-view="graph" hidden>
        <h2>Graph</h2>
        <div class="row-controls">
          <input id="graph-seed" type="search" placeholder="起点 Concept id" autocomplete="off" />
          <label>
            depth
            <input id="graph-depth" type="number" min="0" max="4" value="1" />
          </label>
          <label class="inline-checkbox">
            <input type="checkbox" id="graph-archived" /> archived
          </label>
          <button id="graph-load" class="primary-btn" type="button">Load</button>
          <button id="graph-fit" class="ghost-btn" type="button">Fit</button>
          <button id="graph-reset" class="ghost-btn" type="button">Reset</button>
        </div>
        <p class="hint">
          ノードをクリックすると 1 階層ぶん近傍を追加で展開します。
        </p>
        <div class="graph-layout">
          <div id="cy"></div>
          <aside id="graph-detail" class="graph-detail">
            <p class="muted">ノードを選択すると詳細を表示します。</p>
          </aside>
        </div>
      </section>
    </main>

    <footer class="footer">
      <span id="status-line" class="muted">refmesh console</span>
    </footer>

    <script src="./app.js"></script>
  </body>
</html>
